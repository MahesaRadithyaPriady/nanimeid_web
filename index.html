<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NanimeID — Portal nonton anime sub Indo dan baca manga/manhwa gratis tanpa iklan." />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <title>NanimeID — Portal Nonton Anime & Baca Manga Tanpa Iklan</title>
    
    <style>
      body {
        background-color: #0d0d0d;
        color: #f0f0f0;
      }
    </style>
    <!-- Anti-FOUC: apply theme BEFORE first paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          if (saved) saved = saved.replace(/['"]+/g, '');
          var preferLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = saved ? saved : (preferLight ? 'light' : 'dark');
          var html = document.documentElement;
          if (theme === 'light') {
            html.classList.add('light');
            html.classList.remove('dark');
            html.setAttribute('data-theme', 'light');
          } else {
            html.classList.add('dark');
            html.classList.remove('light');
            html.setAttribute('data-theme', 'dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body class="bg-bg-base text-text-primary min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
